<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ejercicio 12</title>
</head>
<body>
    <script>
        const num=parseInt (prompt("ingrese un numero: "));
        if(isNaN(num)){
            document.write("Ingrese un numero valido");
        }else if (num%2===0){
            document.write(`El numero ${num} es par`);
        }else{
            document.write(`El numero ${num} es impar`);
        }
    </script>
</body>
</html>
