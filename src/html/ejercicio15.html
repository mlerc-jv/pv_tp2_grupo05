<!DOCTYPE html>
<html>
<head>
    <title>Ejercicio 15</title>
</head>
<body>

<script>
const retornarMes = (numero) => {
    switch(numero) {
        case 1: return "Enero";
        case 2: return "Febrero";
        case 3: return "Marzo";
        case 4: return "Abril";
        case 5: return "Mayo";
        case 6: return "Junio";
        case 7: return "Julio";
        case 8: return "Agosto";
        case 9: return "Septiembre";
        case 10: return "Octubre";
        case 11: return "Noviembre";
        case 12: return "Diciembre";
        default: return "No corresponde a un mes";
    }
}

let numero = parseInt(prompt("Ingrese un número del 1 al 12:"));

document.write(`Resultado: ${retornarMes(numero)}`);
</script>

</body>
</html>
