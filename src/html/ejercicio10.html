<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 10</title>
</head>
<body>
    <script>
        const cantidad = parseInt(prompt("Ingrese la cantidad de números que desea cargar:"));
        const numeros = [];
        let suma = 0;

        for (let i = 0; i < cantidad; i++) {
            const numero = parseInt(prompt(`Ingrese el número ${i + 1}:`));
            numeros.push(numero);
            suma += numero;
        }

        const promedio = suma / cantidad;

        document.write(`<h2>Números ingresados: ${numeros}</h2>`);
        document.write(`<p>Promedio: ${promedio}</p>`);
    </script>
</body>
</html>
