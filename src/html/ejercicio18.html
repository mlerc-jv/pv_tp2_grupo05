<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ejercicio 18</title>
</head>
<body>
    <script>
        const num1=parseFloat(prompt("Ingresar el primer numero: "));
        const num2=parseFloat(prompt("Ingresar el segundo numero: "));
        const calcularmayor=(num1,num2) =>{
            if(num1 < num2){
                document.write(`El numero mayor es: ${num2}`);
            }else if (num2 < num1){
                document.write(`El numero mayor es: ${num1}`);
            }else{
                document.write(`Los numeros son iguales`);
            }
               
        };
        calcularmayor(num1,num2);
    </script>
</body>
</html>
