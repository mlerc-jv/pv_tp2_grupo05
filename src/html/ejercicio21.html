<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/assets/css/ejercicio21.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400..900&display=swap" rel="stylesheet">
    
    <title>Ejercicio 21</title>
</head>

<body>

    <main class="container">

        <section class="card">

            <h1>Países y Capitales</h1>

            <p class="subtitle">
                Seleccione un país de América
            </p>

            <div class="form-group">

                <label for="pais">País</label>

                <select id="pais">

                    <option value="">Seleccione un país</option>

                    <option value="Argentina">Argentina</option>
                    <option value="Brasil">Brasil</option>
                    <option value="Chile">Chile</option>
                    <option value="Perú">Perú</option>
                    <option value="Uruguay">Uruguay</option>
                    <option value="Colombia">Colombia</option>
                    <option value="Paraguay">Paraguay</option>
                    <option value="Bolivia">Bolivia</option>
                    <option value="Ecuador">Ecuador</option>
                    <option value="Venezuela">Venezuela</option>

                </select>

            </div>

            <div class="form-group">

                <label for="capital">Capital</label>

                <select id="capital">

                    <option value="">Seleccione una capital</option>

                    <option value="Buenos Aires">Buenos Aires</option>
                    <option value="Brasilia">Brasilia</option>
                    <option value="Santiago">Santiago</option>
                    <option value="Lima">Lima</option>
                    <option value="Montevideo">Montevideo</option>
                    <option value="Bogotá">Bogotá</option>
                    <option value="Asunción">Asunción</option>
                    <option value="La Paz">La Paz</option>
                    <option value="Quito">Quito</option>
                    <option value="Caracas">Caracas</option>

                </select>

            </div>

        </section>

        <section id="resultado" class="display-area"></section>

    </main>

    <script type="module" src="/src/js/ejercicio21.js"></script>

</body>
</html>
