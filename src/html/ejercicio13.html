<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ejercicio 13</title>
</head>
<body>
<script>

const cantidad = parseInt(prompt("¿Cuantos numeros queres ingresar?"));

const numeros = [];

for(let i = 0; i < cantidad; i++){
    const num = parseInt(prompt(`Ingrese el numero ${i+1}:`));
    numeros.push(num);
}

const mostrarArreglo = (arreglo) => {
    for(let i = 0; i < arreglo.length; i++){
        document.write(`${arreglo[i]}<br>`);
    }
};
mostrarArreglo(numeros);

</script>
</body>
</html>
